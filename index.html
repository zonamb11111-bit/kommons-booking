<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>予約 — kommons</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>

:root{--bg:#f7f6f3;--card:#fff;--text:#1a1a1a;--text2:#888;--border:#e8e6e1;--primary:#1a1a1a;--primary-text:#fff;--accent:#b8956a;--success:#2d6a4f;--success-bg:#f0f7f2;--error:#c62828;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
.container{max-width:480px;margin:0 auto;padding:0 20px 40px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-bottom:1px solid var(--border);margin-bottom:10px}
.logo{font-size:22px;font-weight:700;letter-spacing:2px}
.lang-btn{font-size:13px;padding:4px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.progress-wrap{padding:12px 0 4px}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width 0.3s ease;border-radius:2px}
.step-label{display:none}
.step-indicators{display:flex;justify-content:space-between;margin-top:8px;margin-bottom:12px}
.step-dot{font-size:10px;color:var(--text2);opacity:0.4;text-align:center;flex:1;transition:opacity 0.2s}
.step-dot.active{opacity:1;color:var(--accent);font-weight:600}
.step-dot.done{opacity:0.7;color:var(--text)}
.step{display:none;animation:fadeIn 0.25s ease}
.step.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step-title{font-size:20px;font-weight:600;margin-bottom:18px}
.btn-back{display:inline-flex;align-items:center;font-size:15px;color:var(--text2);background:none;border:none;padding:6px 0;margin-bottom:12px;cursor:pointer;font-family:inherit}
.cat-grid{display:flex;flex-direction:column;gap:10px}
.acc-section{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--card)}
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:18px;cursor:pointer;transition:all 0.15s ease;-webkit-tap-highlight-color:transparent}
.acc-header:active{background:#f5f3ee}
.acc-header.selected{background:#faf7f3}
.acc-header.open{border-bottom:1px solid var(--border)}
.acc-left{display:flex;align-items:center;gap:12px}
.acc-right{display:flex;align-items:center;gap:8px}
.acc-arrow{font-size:18px;color:var(--text2);transition:transform 0.2s}
.cat-icon{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);width:52px;display:inline-block;background:#f5f0ea;padding:3px 0;border-radius:4px;text-align:center;flex-shrink:0}
.cat-name{font-size:16px;font-weight:600}
.acc-body{padding:4px 8px 8px;animation:slideDown 0.2s ease}
@keyframes slideDown{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:2000px;transform:translateY(0)}}
.acc-note{font-size:11px;color:var(--text2);padding:6px 8px;margin-bottom:4px;font-style:italic}
.menu-desc{font-size:12px;color:var(--text2);margin-top:1px}
.mood-cta{display:block;text-align:center;padding:12px;margin-top:8px;border:1px dashed transparent;border-radius:12px;color:var(--text2);font-size:13px;text-decoration:none;transition:all 0.2s}
.mood-cta:hover{border-color:var(--border);color:var(--accent);background:#faf7f3}
@media(hover:none){.mood-cta{color:var(--accent);opacity:0.7}.mood-cta:active{opacity:1;background:#faf7f3}}
.addon-item{background:#faf8f5;border:1px dashed var(--border);border-radius:10px;padding:14px 16px;margin:0 8px 10px 24px;cursor:pointer;transition:all 0.15s ease;display:flex;justify-content:space-between;align-items:center}
.addon-item:active{transform:scale(0.98);border-color:var(--accent)}
.addon-item.selected{border-color:var(--accent);border-style:solid;background:#f5f0ea;border-left:3px solid var(--accent)}
.shampoo-note{font-size:12px;color:var(--accent);margin-top:2px}
.menu-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer;transition:all 0.15s ease;display:flex;justify-content:space-between;align-items:center}
.menu-item:active{transform:scale(0.98);border-color:var(--accent)}
.menu-name{font-size:16px;font-weight:500}
.menu-detail{font-size:14px;color:var(--text2);margin-top:3px}
.menu-price{font-size:17px;font-weight:600;white-space:nowrap;margin-left:12px}
.menu-price.faded{font-size:13px;font-weight:400;color:var(--text2);opacity:0.7}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-size:16px;font-weight:600}
.cal-arrow{width:40px;height:40px;border:1px solid var(--border);border-radius:50%;background:var(--card);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.cal-arrow:disabled{opacity:0.3;cursor:default}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-hdr{font-size:12px;color:var(--text2);padding:8px 0;font-weight:500}
.cal-hdr.sun{color:#c62828}
.cal-hdr.sat{color:#1565c0}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:14px}
.cal-cell.available{cursor:pointer;font-weight:600;background:#faf7f3;border-radius:10px}
.cal-cell.available:hover{background:#f0ede8}
.cal-cell.available:active{background:var(--accent);color:#fff}
.cal-cell.disabled{color:#d5d3ce}
.cal-cell.today .cal-day{background:var(--accent);color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.selected-info{font-size:14px;color:var(--text2);margin-bottom:16px;padding:12px 16px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.time-btn{padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--card);font-size:16px;cursor:pointer;text-align:center;transition:all 0.15s ease;font-family:inherit}
.time-btn:active{background:var(--primary);color:var(--primary-text);border-color:var(--primary)}
.time-btn.flash{background:var(--accent);color:#fff;border-color:var(--accent);transition:all 0.15s ease}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:14px;font-weight:500;margin-bottom:6px}
.form-label .req{color:var(--error);margin-left:2px}
.form-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;background:var(--card);-webkit-appearance:none}
.form-input:focus{outline:none;border-color:var(--accent)}
textarea.form-input{resize:vertical;min-height:60px}
.form-error{font-size:12px;color:var(--error);margin-top:4px;display:none}
.form-error.show{display:block}
.btn-primary{width:100%;padding:18px;border:none;border-radius:14px;background:var(--primary);color:var(--primary-text);font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;margin-top:10px}
.btn-primary:active{background:#333}
.btn-primary:disabled{background:#ccc;cursor:default}
.confirm-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.confirm-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0ede8;font-size:15px}
.confirm-row:last-child{border-bottom:none}
.confirm-label{color:var(--text2)}
.confirm-value{font-weight:500;text-align:right;max-width:60%}
.done-wrap{text-align:center;padding-top:32px}
.done-check{width:64px;height:64px;border-radius:50%;background:var(--success-bg);color:var(--success);font-size:32px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.done-msg{font-size:14px;color:var(--text2);margin-top:8px;margin-bottom:24px}
.done-map{display:block;text-align:center;margin-top:16px;color:var(--accent);font-size:14px}
.loading{display:none;position:fixed;inset:0;background:rgba(247,246,243,0.85);z-index:100;align-items:center;justify-content:center}
.loading.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 16px;color:var(--text2)}
.empty-state p{margin-bottom:8px}
.error-msg{text-align:center;padding:32px 16px;color:var(--text2)}
.retry-btn{margin-top:16px;padding:10px 24px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-family:inherit;font-size:14px}
.cat-check{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
.cat-sub{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.menu-item.selected{border-color:var(--accent);background:#faf7f3;border-left:3px solid var(--accent)}
.menu-check{color:var(--accent);font-weight:700;font-size:18px;min-width:24px;text-align:center}
.selection-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);box-shadow:0 -4px 16px rgba(0,0,0,0.06);padding:12px 16px;display:none;align-items:center;gap:12px;z-index:50}
.selection-bar.show{display:flex}
.selection-bar-inner{max-width:480px;margin:0 auto;width:100%;display:flex;align-items:center;gap:12px}
.sel-info{flex:1;font-size:13px;color:var(--text2);line-height:1.3}
.sel-info strong{color:var(--text);display:block;font-size:14px}
.sel-next{padding:12px 24px;border:none;border-radius:10px;background:var(--primary);color:var(--primary-text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.sel-next:active{background:#333}
.container.has-bar{padding-bottom:100px}
.lang-select-btn{width:200px;padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--card);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s ease}
.lang-select-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-line-close{width:100%;padding:14px;border:none;border-radius:12px;background:#06C755;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px}
.btn-line-close:active{background:#05a648}

</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="logo">kommons</div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </header>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="step-label" id="stepLabel"></div>
    <div class="step-indicators" id="stepIndicators"></div>
  </div>
  <section id="step-lang" class="step">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:24px;text-align:center">
      <div style="font-size:24px;font-weight:700;letter-spacing:3px;margin-bottom:8px">kommons</div>
      <p style="font-size:14px;color:var(--text2);margin-bottom:16px">Please select your language<br>言語を選んでください</p>
      <button class="lang-select-btn" onclick="chooseLang('ja')">日本語</button>
      <button class="lang-select-btn" onclick="chooseLang('en')">English</button>
    </div>
  </section>
  <section id="step-category" class="step">
    <h2 class="step-title" id="catTitle"></h2>
    <div class="cat-grid" id="catGrid"></div>
  </section>
  <section id="step-date" class="step">
    <button class="btn-back" id="dateBack" onclick="goBack()">&larr;</button>
    <h2 class="step-title" id="dateTitle"></h2>
    <div id="calendar"></div>
  </section>
  <section id="step-time" class="step">
    <button class="btn-back" onclick="goBack()">&larr;</button>
    <h2 class="step-title" id="timeTitle"></h2>
    <div class="selected-info" id="selectedDateInfo"></div>
    <div id="timeGrid"></div>
  </section>
  <section id="step-info" class="step">
    <button class="btn-back" onclick="goBack()">&larr;</button>
    <h2 class="step-title" id="infoTitle"></h2>
    <div id="infoMoodSummary"></div>
    <form id="infoForm" onsubmit="submitInfo(event)">
      <div class="form-group">
        <label class="form-label"><span id="nameLabel"></span><span class="req">*</span></label>
        <input class="form-input" type="text" id="nameInput" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label"><span id="phoneLabel"></span><span class="req">*</span></label>
        <input class="form-input" type="tel" id="phoneInput" required autocomplete="tel">
        <div class="form-error" id="phoneError"></div>
      </div>
      <div class="form-group">
        <label class="form-label"><span id="emailLabel"></span><span class="req">*</span></label>
        <input class="form-input" type="email" id="emailInput" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" id="notesLabel"></label>
        <textarea class="form-input" id="notesInput" rows="3"></textarea>
      </div>
      <button type="submit" class="btn-primary" id="infoBtn"></button>
    </form>
  </section>
  <section id="step-confirm" class="step">
    <button class="btn-back" onclick="goBack()">&larr;</button>
    <h2 class="step-title" id="confirmTitle"></h2>
    <div class="confirm-card" id="confirmCard"></div>
    <div id="confirmMoodSummary"></div>
    <button class="btn-primary" id="bookBtn" onclick="submitBooking()"></button>
  </section>
  <section id="step-done" class="step">
    <div class="done-wrap">
      <div class="done-check">&#10003;</div>
      <h2 class="step-title" id="doneTitle"></h2>
      <p class="done-msg" id="doneMsg"></p>
      <div class="confirm-card" id="doneCard"></div>
      <a class="done-map" href="https://maps.app.goo.gl/XJqp4YFyVdCUhDN89" target="_blank" id="mapLink"></a>
    </div>
  </section>
</div>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="selection-bar" id="selectionBar">
  <div class="selection-bar-inner">
    <div class="sel-info" id="selInfo"></div>
    <button class="sel-next" id="selNextBtn" onclick="proceedWithSelection()"></button>
  </div>
</div>
<script>
var GAS_API = 'https://script.google.com/macros/s/AKfycbyJkyjUM2x9Eiv0AwvtUMi0Syx34jrppeglnXAOVVeVNxGDwDaHhqar255O4rpEqPCj1Q/exec';
var LIFF_ID = '2009555220-HXbJBLAX';
var API_MAP = {handleMenus:'menus',handleSlots:'slots',handleDays:'days',handleBook:'book'};
var urlParams = new URLSearchParams(window.location.search);
var LANG = urlParams.get('lang') || '';
if (LANG === 'jp') LANG = 'ja';
var INITIAL_MENU_ID = (urlParams.get('menuId') || '').replace(/[^a-zA-Z0-9_]/g, '');
var LANG_FROM_URL = !!urlParams.get('lang');
var lineUserId = '';
var lineDisplayName = '';
var liffReady = false;
var MOOD_CURATOR = {};
['mood','cut','cutLength','perm','color','nuance','technique','texture','damage','spa','signatureCode'].forEach(function(k) {
  var v = urlParams.get(k);
  if (v) MOOD_CURATOR[k] = v;
});
function api(fn, params) {
  var action = API_MAP[fn] || fn;
  var qs = new URLSearchParams({ action: action });
  if (params) {
    Object.keys(params).forEach(function(k) {
      if (params[k] !== undefined && params[k] !== null && params[k] !== '') {
        qs.set(k, params[k]);
      }
    });
  }
  return fetch(GAS_API + '?' + qs.toString()).then(function(r) { return r.json(); });
}
function initLiff() {
  if (!LIFF_ID) return Promise.resolve();
  return liff.init({ liffId: LIFF_ID }).then(function() {
    liffReady = true;
    if (liff.isLoggedIn()) {
      return liff.getProfile().then(function(p) {
        lineUserId = p.userId;
        lineDisplayName = p.displayName;
      });
    }
  }).catch(function(e) { console.log('LIFF error:', e); });
}
var state = {step:'',category:'',openCategory:'',selections:{},addons:{},isCombo:false,menuId:'',menuIds:[],totalDuration:0,totalPrice:0,date:'',time:'',timeEnd:'',name:'',phone:'',email:'',notes:''};
var allMenus = {};
var calYear, calMonth;
var monthCache = {};
var CATS = [
  {id:'cut',icon:'Cut',en:'Cut',ja:'\u30AB\u30C3\u30C8'},
  {id:'color',icon:'Color',en:'Color',ja:'\u30AB\u30E9\u30FC'},
  {id:'perm',icon:'Perm',en:'Perm',ja:'\u30D1\u30FC\u30DE'},
  {id:'treatment',icon:'Care',en:'Treatment',ja:'\u30C8\u30EA\u30FC\u30C8\u30E1\u30F3\u30C8'},
  {id:'headspa',icon:'Spa',en:'Head Spa',ja:'\u30D8\u30C3\u30C9\u30B9\u30D1'},
  {id:'shampoo',icon:'S&B',en:'Shampoo Blow',ja:'',langOnly:'en'},
  {id:'combo',icon:'Set',en:'Combo Menus',ja:'\u7D44\u307F\u5408\u308F\u305B\u30E1\u30CB\u30E5\u30FC'}
];

var STEP_PCT={lang:0,category:0,date:25,time:50,info:75,confirm:90,done:100};
var STEP_LBL={lang:'',category:'stepMenu',date:'stepDate',time:'stepTime',info:'stepInfo',confirm:'stepConfirm',done:''};
function goTo(step){
  var secs=document.querySelectorAll('.step');for(var i=0;i<secs.length;i++)secs[i].classList.remove('active');
  state.step=step;document.getElementById('step-'+step).classList.add('active');
  var isLangStep=step==='lang';
  document.querySelector('.header').style.display=isLangStep?'none':'';
  document.querySelector('.progress-wrap').style.display=isLangStep?'none':'';
  document.getElementById('progressFill').style.width=(STEP_PCT[step]||0)+'%';
  var lk=STEP_LBL[step];document.getElementById('stepLabel').textContent=lk?t(lk):'';
  var stepsArr=['category','date','time','info','confirm'];var lblArr=['stepMenu','stepDate','stepTime','stepInfo','stepConfirm'];var curIdx=stepsArr.indexOf(step);
  var indEl=document.getElementById('stepIndicators');
  if(step==='done'||isLangStep){indEl.style.display='none'}else{indEl.style.display='flex';var ih='';for(var si=0;si<stepsArr.length;si++){var cls='step-dot';if(si===curIdx)cls+=' active';else if(si<curIdx)cls+=' done';ih+='<div class="'+cls+'">'+t(lblArr[si])+'</div>'}indEl.innerHTML=ih}
  updateSelectionBar();window.scrollTo(0,0);
}
function goBack(){
  switch(state.step){
    case 'date':renderCategories();goTo('category');break;
    case 'time':renderCalendar(calYear,calMonth);goTo('date');break;
    case 'info':goTo('time');break;
    case 'confirm':if(state.infoSkipped){goTo('time')}else{renderInfoForm();goTo('info')}break;
  }
}

/* ── Selection helpers ── */
function needsShampoo(){
  var ids=Object.values(state.selections);
  if(ids.length===0)return false;
  var hasCut=!!state.selections['cut'];
  if(state.selections['shampoo']==='shampoo_blow')return false;
  return !hasCut;
}
function getSelTotals(){
  var ids=Object.values(state.selections);var p=0,d=0;
  ids.forEach(function(id){var m=allMenus[id];if(m){p+=m.price;d+=m.duration;}});
  Object.keys(state.addons).forEach(function(id){if(state.addons[id]){var m=allMenus[id];if(m){p+=m.price;d+=m.duration;}}});
  var shampoo=needsShampoo()&&allMenus['shampoo_blow'];
  if(shampoo){p+=shampoo.price;d+=shampoo.duration;}
  var addonCount=Object.keys(state.addons).filter(function(id){return state.addons[id];}).length;
  return {price:p,duration:d,count:ids.length,hasShampoo:!!shampoo,addonCount:addonCount};
}
function updateSelectionBar(){
  var bar=document.getElementById('selectionBar');var ct=document.querySelector('.container');
  var n=Object.keys(state.selections).length;
  if(n===0||state.step!=='category'){bar.classList.remove('show');ct.classList.remove('has-bar');return}
  bar.classList.add('show');ct.classList.add('has-bar');
  var tot=getSelTotals();
  var shampooNote=tot.hasShampoo?'<div class="shampoo-note">+ '+(LANG==='en'?'Shampoo & Blow Dry':'\u30B7\u30E3\u30F3\u30D7\u30FC\uFF06\u30D6\u30ED\u30FC')+'</div>':'';
  document.getElementById('selInfo').innerHTML='<strong>'+tot.count+(LANG==='en'?(tot.count>1?' services':' service'):'\u4EF6')+'</strong>'+t('yen')+tot.price.toLocaleString()+' \u00B7 '+tot.duration+t('min')+shampooNote;
  document.getElementById('selNextBtn').textContent=t('next');
}
function proceedWithSelection(){
  var tot=getSelTotals();state.isCombo=false;state.menuIds=Object.values(state.selections);
  Object.keys(state.addons).forEach(function(id){if(state.addons[id])state.menuIds.push(id);});
  if(tot.hasShampoo)state.menuIds.push('shampoo_blow');
  state.totalDuration=tot.duration;state.totalPrice=tot.price;
  monthCache={};var now=new Date();calYear=now.getFullYear();calMonth=now.getMonth()+1;
  renderCalendar(calYear,calMonth);goTo('date');
}
function menuNamesDisplay(){
  return state.menuIds.map(function(id){var m=allMenus[id];return m?(LANG==='en'?m.name_en:m.name_jp):id}).join(' + ');
}

      for(var id in allMenus){var m=allMenus[id];if(m.rebookingOnly)continue;
        if(m.addon)continue;
        if(m.langOnly&&m.langOnly!==LANG)continue;
        if(isComboCat){if(!m.combo)continue}else{if(m.category!==cat.id||m.combo)continue}
        var name=LANG==='en'?m.name_en:m.name_jp;
        var isMenuSel=!isComboCat&&(state.selections[cat.id]===id);

        var detail=m.duration>0?m.duration+t('min'):'';
        var desc='';
        if(m.desc_jp||m.desc_en){desc='<div class="menu-desc">'+escHtml(LANG==='en'?m.desc_en:m.desc_jp)+'</div>';}
        html+='<div class="'+menuCls+'" onclick="selectMenu(\''+id+'\',false)"><div><div class="menu-name">'+escHtml(name)+'</div>'+desc+'<div class="menu-detail">'+detail+'</div></div>'+right+'</div>';
        if(isMenuSel){
          for(var aid in allMenus){var am=allMenus[aid];if(!am.addon||!am.showWith)continue;
            if(am.showWith.indexOf(id)===-1)continue;
            if(am.langOnly&&am.langOnly!==LANG)continue;
            var aname=LANG==='en'?am.name_en:am.name_jp;
            var isAddonSel=!!state.addons[aid];

function selectCategory(catId){
  state.openCategory=state.openCategory===catId?'':catId;
  renderCategories();
}
function selectMenu(menuId,isCombo){
  var m=allMenus[menuId];if(!m)return;
  if(isCombo){
    state.selections={};state.addons={};state.openCategory='';state.isCombo=true;state.menuId=menuId;state.menuIds=[menuId];
    state.totalDuration=m.duration;state.totalPrice=m.price;
    monthCache={};var now=new Date();calYear=now.getFullYear();calMonth=now.getMonth()+1;
    renderCalendar(calYear,calMonth);goTo('date');
  }else if(m.addon){
    if(state.addons[menuId])delete state.addons[menuId];else state.addons[menuId]=true;
    state.isCombo=false;renderCategories();updateSelectionBar();
  }else{
    var cat=m.category;
    var prevSel=state.selections[cat];
    if(prevSel===menuId){delete state.selections[cat]}
    else{state.selections[cat]=menuId}
    if(prevSel&&prevSel!==menuId){for(var ak in state.addons){var ad=allMenus[ak];if(ad&&ad.showWith&&ad.showWith.indexOf(prevSel)!==-1)delete state.addons[ak]}}
    if(!state.selections[cat]){for(var ak2 in state.addons){var ad2=allMenus[ak2];if(ad2&&ad2.category===cat)delete state.addons[ak2]}}
    state.isCombo=false;renderCategories();updateSelectionBar();
  }
}

/* ── Calendar ── */
function renderCalendar(year,month){
  document.getElementById('dateTitle').textContent=t('selectDate');showLoading();
  var ym=year+'-'+String(month).padStart(2,'0');
  if(monthCache[ym]){buildCalendar(year,month,monthCache[ym]);hideLoading();return}
  var p={yearMonth:ym};if(state.isCombo)p.menuId=state.menuId;else p.duration=state.totalDuration;
  api('handleDays',p).then(function(r){monthCache[ym]=r.days||[];buildCalendar(year,month,r.days||[]);hideLoading()}).catch(function(){hideLoading();showError('calendar')});
}
function buildCalendar(year,month,days){
  var el=document.getElementById('calendar');
  var dayNames=[t('sun'),t('mon'),t('tue'),t('wed'),t('thu'),t('fri'),t('sat')];
  var monthLabels=LANG==='en'?['January','February','March','April','May','June','July','August','September','October','November','December']:['1\u6708','2\u6708','3\u6708','4\u6708','5\u6708','6\u6708','7\u6708','8\u6708','9\u6708','10\u6708','11\u6708','12\u6708'];
  var now=new Date();var curY=now.getFullYear(),curM=now.getMonth()+1;
  var canPrev=!(year===curY&&month===curM);
  var maxDate=new Date(now.getTime()+30*86400000);var nextFirst=new Date(year,month,1);var canNext=nextFirst<=maxDate;
  var label=LANG==='en'?monthLabels[month-1]+' '+year:year+'\u5E74'+monthLabels[month-1];
  var h='<div class="cal-nav"><button class="cal-arrow" onclick="changeMonth(-1)"'+(canPrev?'':' disabled')+'>\u2039</button><span class="cal-month">'+label+'</span><button class="cal-arrow" onclick="changeMonth(1)"'+(canNext?'':' disabled')+'>\u203A</button></div><div class="cal-grid">';
  for(var i=0;i<7;i++){var cls='cal-hdr';if(i===0)cls+=' sun';if(i===6)cls+=' sat';h+='<div class="'+cls+'">'+dayNames[i]+'</div>'}
  var availMap={};days.forEach(function(d){availMap[d.date]=d.slotCount});
  var firstDay=new Date(year,month-1,1).getDay();var totalDays=new Date(year,month,0).getDate();
  var todayStr=curY+'-'+String(curM).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  for(var i=0;i<firstDay;i++)h+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=totalDays;d++){
    var ds=year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var avail=availMap[ds];var isToday=ds===todayStr;
    if(avail){h+='<div class="cal-cell available'+(isToday?' today':'')+'" onclick="selectDate(\''+ds+'\')"><span class="cal-day">'+d+'</span></div>'}
    else{h+='<div class="cal-cell disabled'+(isToday?' today':'')+'"><span class="cal-day">'+d+'</span></div>'}
  }
  h+='</div>';el.innerHTML=h;
}
function changeMonth(delta){calMonth+=delta;if(calMonth>12){calMonth=1;calYear++}if(calMonth<1){calMonth=12;calYear--}renderCalendar(calYear,calMonth)}
function selectDate(dateStr){state.date=dateStr;renderTimeSlots(dateStr);goTo('time')}
function renderTimeSlots(dateStr){
  document.getElementById('timeTitle').textContent=t('selectTime');
  var parts=dateStr.split('-');var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var dayNames=[t('sun'),t('mon'),t('tue'),t('wed'),t('thu'),t('fri'),t('sat')];
  var dateLabel=LANG==='en'?dayNames[d.getDay()]+', '+parseInt(parts[1])+'/'+parseInt(parts[2]):parseInt(parts[1])+'/'+parseInt(parts[2])+'('+dayNames[d.getDay()]+')';
  document.getElementById('selectedDateInfo').textContent=menuNamesDisplay()+' \u00B7 '+dateLabel;
  showLoading();
  var p={date:dateStr};if(state.isCombo)p.menuId=state.menuId;else p.duration=state.totalDuration;
  api('handleSlots',p).then(function(r){
    hideLoading();var container=document.getElementById('timeGrid');
    if(!r.slots||r.slots.length===0){container.innerHTML='<div class="empty-state"><p>'+t('noSlots')+'</p><p>'+t('tryAnother')+'</p></div>';return}
    var h='<div class="time-grid">';r.slots.forEach(function(s){h+='<button class="time-btn" onclick="selectTime(\''+s.start+'\',\''+s.end+'\',this)">'+s.start+'</button>'});h+='</div>';container.innerHTML=h;
  }).catch(function(){hideLoading();showError('timeGrid')});
}
function loadSavedUserInfo(){try{var saved=localStorage.getItem('kommons_user');if(saved){return JSON.parse(saved)}}catch(e){}return null}
function saveUserInfo(){try{localStorage.setItem('kommons_user',JSON.stringify({name:state.name,phone:state.phone,email:state.email}))}catch(e){}}
function selectTime(start,end,el){if(el){el.classList.add('flash')}setTimeout(function(){state.time=start;state.timeEnd=end;var saved=loadSavedUserInfo();if(saved&&saved.name&&saved.phone&&saved.email){state.name=saved.name;state.phone=saved.phone;state.email=saved.email;state.infoSkipped=true;renderConfirmation();goTo('confirm')}else{if(saved){state.name=saved.name||lineDisplayName||'';state.phone=saved.phone||'';state.email=saved.email||''}else if(lineDisplayName){state.name=lineDisplayName}state.infoSkipped=false;renderInfoForm();goTo('info')}},200)}

  if(mc.cut)rows.push([LANG==='en'?'Cut':'\u30AB\u30C3\u30C8',mc.cutLength?mc.cut+' \u2014 '+mc.cutLength:mc.cut]);
  if(mc.color)rows.push([LANG==='en'?'Color':'\u30AB\u30E9\u30FC',mc.color]);
  if(mc.perm)rows.push([LANG==='en'?'Perm':'\u30D1\u30FC\u30DE',mc.perm]);
  if(mc.texture)rows.push([LANG==='en'?'Texture':'\u8CEA\u611F',mc.texture]);
  if(mc.damage)rows.push([LANG==='en'?'Damage Level':'\u30C0\u30E1\u30FC\u30B8',mc.damage]);

  if(rows.length===0){el.innerHTML='';return}
  var h='<div style="background:#f5f3ee;border:1px solid #e8e6e1;border-radius:10px;padding:14px 16px;margin:12px 0">';

  if(!state.notes&&MOOD_CURATOR.signatureCode){
    state.notes='[Signature Code] '+MOOD_CURATOR.signatureCode;
  }
  document.getElementById('notesInput').value=state.notes;
  // Show Mood Curator summary above the form if available
  renderMoodCuratorSummary('infoMoodSummary');
}
function submitInfo(e){
  e.preventDefault();
  var name=document.getElementById('nameInput').value.trim();
  var phone=document.getElementById('phoneInput').value.trim().replace(/[-\s\u3000]/g,'');
  var email=document.getElementById('emailInput').value.trim();
  var notes=document.getElementById('notesInput').value.trim();
  if(!/^[+]?\d{7,15}$/.test(phone)){document.getElementById('phoneError').classList.add('show');document.getElementById('phoneInput').focus();return}
  document.getElementById('phoneError').classList.remove('show');
  state.name=name;state.phone=phone;state.email=email;state.notes=notes;renderConfirmation();goTo('confirm');
}
function renderConfirmation(){
  document.getElementById('confirmTitle').textContent=t('confirmBooking');
  document.getElementById('bookBtn').textContent=t('bookNow');
  var names=menuNamesDisplay();
  var parts=state.date.split('-');var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var dayNames=[t('sun'),t('mon'),t('tue'),t('wed'),t('thu'),t('fri'),t('sat')];
  var dateLabel=LANG==='en'?dayNames[d.getDay()]+', '+parseInt(parts[1])+'/'+parseInt(parts[2])+'/'+parts[0]:parts[0]+'\u5E74'+parseInt(parts[1])+'\u6708'+parseInt(parts[2])+'\u65E5('+dayNames[d.getDay()]+')';
  var card=document.getElementById('confirmCard');
  var editLink='<div style="text-align:right;margin-top:4px"><a href="#" onclick="state.infoSkipped=false;renderInfoForm();goTo(\'info\');return false" style="font-size:12px;color:var(--accent);text-decoration:none">'+(LANG==='en'?'Edit info \u270E':'\u60C5\u5831\u3092\u7DE8\u96C6 \u270E')+'</a></div>';
  card.innerHTML=cRow(t('menu'),names)+cRow(t('dateTime'),dateLabel+' '+state.time+'\u301C'+state.timeEnd)+cRow(t('duration'),state.totalDuration+t('min'))+cRow(t('price'),t('yen')+state.totalPrice.toLocaleString())+'<div style="border-top:2px solid #f0ede8;margin:8px 0"></div>'+cRow(t('name'),state.name)+cRow(t('phone'),state.phone)+cRow(t('email'),state.email)+(state.notes?cRow(t('notes'),state.notes):'')+editLink;
  renderMoodCuratorSummary('confirmMoodSummary');
}
function submitBooking(){
  var btn=document.getElementById('bookBtn');btn.disabled=true;showLoading();
  var bookNotes=state.notes;
  if(MOOD_CURATOR&&MOOD_CURATOR.mood){
    var mcParts=['[Mood Curator]','Mood: '+MOOD_CURATOR.mood];
    if(MOOD_CURATOR.cut)mcParts.push('Cut: '+(MOOD_CURATOR.cutLength?MOOD_CURATOR.cut+' - '+MOOD_CURATOR.cutLength:MOOD_CURATOR.cut));
    if(MOOD_CURATOR.color)mcParts.push('Color: '+MOOD_CURATOR.color);
    if(MOOD_CURATOR.perm)mcParts.push('Perm: '+MOOD_CURATOR.perm);
    if(MOOD_CURATOR.texture)mcParts.push('Texture: '+MOOD_CURATOR.texture);
    if(MOOD_CURATOR.signatureCode)mcParts.push('Code: '+MOOD_CURATOR.signatureCode);
    bookNotes=bookNotes?(bookNotes+'\n'+mcParts.join('\n')):mcParts.join('\n');
  }
  api('handleBook',{menuIds:state.menuIds.join(','),date:state.date,time:state.time,name:state.name,phone:state.phone,email:state.email,notes:bookNotes,lang:LANG,source:lineUserId?'web_liff':'web',lineUserId:lineUserId})
  .then(function(r){hideLoading();if(r.error){btn.disabled=false;alert(r.error);if(r.error.indexOf('no longer')>=0||r.error.indexOf('\u57CB\u307E')>=0){monthCache={};renderCalendar(calYear,calMonth);goTo('date')}return}saveUserInfo();renderDone();goTo('done')})
  .catch(function(){hideLoading();btn.disabled=false;alert(t('error'))});
}
function renderDone(){
  document.getElementById('doneTitle').textContent=t('booked');
  document.getElementById('doneMsg').textContent=t('bookedMsg');
  document.getElementById('mapLink').textContent=t('mapText');
  var names=menuNamesDisplay();
  var parts=state.date.split('-');var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var dayNames=[t('sun'),t('mon'),t('tue'),t('wed'),t('thu'),t('fri'),t('sat')];
  var dateLabel=LANG==='en'?dayNames[d.getDay()]+', '+parseInt(parts[1])+'/'+parseInt(parts[2]):parseInt(parts[1])+'/'+parseInt(parts[2])+'('+dayNames[d.getDay()]+')';
  var card=document.getElementById('doneCard');
  card.innerHTML=cRow(t('menu'),names)+cRow(t('dateTime'),dateLabel+' '+state.time+'\u301C'+state.timeEnd)+cRow(t('price'),t('yen')+state.totalPrice.toLocaleString())+'<div style="border-top:1px solid #f0ede8;margin:8px 0"></div><div style="font-size:13px;color:#888;padding:8px 0">'+t('address')+'</div>';
  if(liffReady&&typeof liff!=='undefined'&&liff.isInClient&&liff.isInClient()){
    var closeLabel=LANG==='en'?'Back to LINE':'LINE\u306B\u623B\u308B';
    card.insertAdjacentHTML('afterend','<button class="btn-line-close" onclick="liff.closeWindow()">'+closeLabel+'</button>');
  }
}
function showError(cid){var el=document.getElementById(cid);el.innerHTML='<div class="error-msg"><p>'+t('error')+'</p><button class="retry-btn" onclick="location.reload()">\u21BB Retry</button></div>'}
function init(isLangSwitch){
  document.getElementById('langBtn').textContent=LANG==='en'?'\u65E5\u672C\u8A9E':'EN';
  showLoading();
  api('handleMenus',{lang:LANG}).then(function(r){
    hideLoading();allMenus=r.menus||{};
    for(var cat in state.selections){if(!allMenus[state.selections[cat]])delete state.selections[cat]}
    if(INITIAL_MENU_ID&&allMenus[INITIAL_MENU_ID]){
      var m=allMenus[INITIAL_MENU_ID];state.isCombo=true;state.menuId=INITIAL_MENU_ID;
      state.menuIds=[INITIAL_MENU_ID];state.totalDuration=m.duration;state.totalPrice=m.price;
      document.getElementById('dateBack').style.display='none';
      var now=new Date();calYear=now.getFullYear();calMonth=now.getMonth()+1;
      renderCalendar(calYear,calMonth);goTo('date');
    }else{INITIAL_MENU_ID='';renderCategories();goTo('category')}
  }).catch(function(){hideLoading();showError('catGrid');goTo('category')});
}
function startApp() {
  if (LANG_FROM_URL || INITIAL_MENU_ID) {
    if (!LANG) LANG = 'ja';
    init(false);
  } else {
    goTo('lang');
  }
}
startApp();
initLiff();
</script>
</body>
</html>
